<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Farewell, {{RECIPIENT_NAME}}!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Indie+Flower&family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading notes...</div>
</div>

<div class="sync-status" id="syncStatus">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">Synced</span>
</div>

<div class="header">
  <h1>🌸 Farewell, {{RECIPIENT_NAME}}! 🌸</h1>
  <p class="subtitle">A board full of love from your amazing team</p>
  <div class="view-toggle">
    <button class="view-btn active" id="boardBtn" onclick="setView('board')">📋 Board</button>
    <button class="view-btn" id="cardBtn" onclick="setView('card')">💌 Card View</button>
  </div>
  <div class="note-count" id="noteCount">Loading...</div>
</div>

<div class="main">
  <div class="compose">
    <div class="compose-inner">
      <h3>✍️ Leave a note for {{RECIPIENT_NAME}}</h3>
      <input type="text" id="authorInput" placeholder="Your name">
      <textarea id="messageInput" rows="4" placeholder="Write your farewell message... 💛"></textarea>
      <div class="attachments" id="attachments"></div>
      <div class="actions">
        <button class="action-btn" id="emojiToggle" onclick="toggleEmoji()">😊</button>
        <button class="action-btn" onclick="openDoodle()">🎨 Doodle</button>
        <button class="pin-btn" id="pinBtn" onclick="pinNote()" disabled>Pin it! 📌</button>
      </div>
      <div class="emoji-picker hidden" id="emojiPicker"></div>
    </div>
  </div>

  <div class="board-area" id="boardView"></div>
  <div class="card-area hidden" id="cardView">
    <div class="card-container">
      <div class="card-header"><span>💌</span><h2>Messages for {{RECIPIENT_NAME}}</h2></div>
      <div class="card-notes" id="cardNotes"></div>
    </div>
  </div>
</div>

<div class="doodle-overlay hidden" id="doodleOverlay">
  <div class="doodle-panel">
    <div class="doodle-header">
      <span>🎨 Draw something!</span>
      <button onclick="closeDoodle()">✕</button>
    </div>
    <canvas class="doodle-canvas" id="doodleCanvas" width="560" height="300"></canvas>
    <div class="doodle-tools">
      <div id="doodleColors" style="display:flex;gap:6px"></div>
      <span style="margin:0 6px;color:#999">|</span>
      <div id="doodleSizes" style="display:flex;gap:6px;align-items:center"></div>
      <button class="clear-btn" onclick="clearDoodle()">Clear</button>
    </div>
    <button class="save-doodle-btn" onclick="saveDoodle()">Add to my note ✓</button>
  </div>
</div>

<div class="edit-overlay hidden" id="editOverlay">
  <div class="edit-panel">
    <div class="edit-header">
      <span>✏️ Edit your note</span>
      <button onclick="closeEdit()">✕</button>
    </div>
    <textarea id="editInput" rows="6" placeholder="Edit your message..." oninput="validateEditForm()"></textarea>
    <div class="edit-actions">
      <button class="cancel-edit-btn" onclick="closeEdit()">Cancel</button>
      <button class="save-edit-btn" id="saveEditBtn" onclick="saveEdit()">Save changes ✓</button>
    </div>
  </div>
</div>

<div class="confetti-container hidden" id="confetti"></div>
<div class="footer"><p>Made with love 💛 • Pin your note above!</p></div>

<!-- config.js holds API keys and is NOT committed to git (see .gitignore).
     Copy config.example.js → config.js and fill in your JSONBin credentials. -->
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
